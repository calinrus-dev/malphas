name: malphas_app
description: "Malphas v2.5.5 — Multi-Architecture Android Deployment"
publish_to: 'none'
version: 2.5.5+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.2
  archive: ^3.3.7
  path_provider: ^2.1.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf

  # Asset section declared for future engine asset integration
  assets:
    - assets/fonts/
    - assets/sprites/
