name: malphas_app
description: "Malphas v3.0.0 — Sovereign Runtime"
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.2
  path_provider: ^2.1.1
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  file_picker: ^8.0.0+1
  crypto: ^3.0.3
  audioplayers: ^6.0.0
  geolocator: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf

  # Asset section declared for future engine asset integration
  assets:
    - assets/fonts/
    - assets/sprites/
    - assets/packages/
    - assets/trust_anchor.pem
