name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-sync:
    name: Verify version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify versions match across Cargo.toml, pubspec.yaml, README.md and AGENTS.md
        shell: bash
        run: |
          CARGO_VERSION=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          PUBSPEC_VERSION=$(grep -E '^version:\s*' flutter_app/pubspec.yaml | sed -E 's/.*:\s*([^+]+).*/\1/')
          README_VERSION=$(grep -E '^# Malphas v[0-9]+\.[0-9]+\.[0-9]+' README.md | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          AGENTS_VERSION=$(grep -E '^# Malphas Agent Instructions — v[0-9]+\.[0-9]+\.[0-9]+' .agents/AGENTS.md | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "Cargo.toml:    $CARGO_VERSION"
          echo "pubspec.yaml:  $PUBSPEC_VERSION"
          echo "README.md:     $README_VERSION"
          echo "AGENTS.md:     $AGENTS_VERSION"
          if [ "$CARGO_VERSION" != "$PUBSPEC_VERSION" ] || \
             [ "$CARGO_VERSION" != "$README_VERSION" ] || \
             [ "$CARGO_VERSION" != "$AGENTS_VERSION" ]; then
            echo "Version mismatch detected!"
            exit 1
          fi
          echo "All versions are in sync: $CARGO_VERSION"

  rust-core:
    uses: ./.github/workflows/rust_ci.yml

  analyze-test:
    name: Flutter analyze and test
    needs: rust-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-ubuntu-latest
          path: native/

      - name: Download CLI executable
        uses: actions/download-artifact@v4
        with:
          name: malphas-cli-ubuntu-latest
          path: native/

      - name: Place native library and signature
        shell: bash
        run: |
          mkdir -p motors
          if [ -f native/libmalphas_core.so ]; then
            LIB=native/libmalphas_core.so
          elif [ -f native/target/release/libmalphas_core.so ]; then
            LIB=native/target/release/libmalphas_core.so
          elif [ -f native/malphas_core.dll ]; then
            LIB=native/malphas_core.dll
          elif [ -f native/target/release/malphas_core.dll ]; then
            LIB=native/target/release/malphas_core.dll
          elif [ -f native/libmalphas_core.dylib ]; then
            LIB=native/libmalphas_core.dylib
          elif [ -f native/target/release/libmalphas_core.dylib ]; then
            LIB=native/target/release/libmalphas_core.dylib
          else
            echo "Error: Native library not found"
            exit 1
          fi
          base=$(basename "$LIB")
          cp "$LIB" "./$base"
          cp "$LIB" motors/"$base"
          cp "$LIB" ../"$base"

      - name: Download engine signature
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-sig-ubuntu-latest
          path: native-sig/

      - name: Place engine signature
        shell: bash
        run: |
          mkdir -p motors
          if [ -f native-sig/libmalphas_core.so.sig ]; then
            SIG=native-sig/libmalphas_core.so.sig
          elif [ -f native-sig/target/release/libmalphas_core.so.sig ]; then
            SIG=native-sig/target/release/libmalphas_core.so.sig
          elif [ -f native-sig/malphas_core.dll.sig ]; then
            SIG=native-sig/malphas_core.dll.sig
          elif [ -f native-sig/target/release/malphas_core.dll.sig ]; then
            SIG=native-sig/target/release/malphas_core.dll.sig
          elif [ -f native-sig/libmalphas_core.dylib.sig ]; then
            SIG=native-sig/libmalphas_core.dylib.sig
          elif [ -f native-sig/target/release/libmalphas_core.dylib.sig ]; then
            SIG=native-sig/target/release/libmalphas_core.dylib.sig
          else
            echo "Error: Engine signature not found"
            exit 1
          fi
          base=$(basename "$SIG")
          cp "$SIG" "./$base"
          cp "$SIG" motors/"$base"
          cp "$SIG" ../"$base"

      - name: Place CLI binary where MalphasPackageCompiler finds it
        shell: bash
        run: |
          mkdir -p motors
          if [ -f native/malphas-cli ]; then
            CLI_BIN=native/malphas-cli
          elif [ -f native/target/release/malphas-cli ]; then
            CLI_BIN=native/target/release/malphas-cli
          elif [ -f native/malphas-cli.exe ]; then
            CLI_BIN=native/malphas-cli.exe
          elif [ -f native/target/release/malphas-cli.exe ]; then
            CLI_BIN=native/target/release/malphas-cli.exe
          else
            echo "Error: CLI executable not found"
            exit 1
          fi
          cp "$CLI_BIN" motors/malphas-cli
          chmod +x motors/malphas-cli

      - name: Compile bouncing_demo manifest with downloaded CLI
        shell: bash
        run: |
          export LD_LIBRARY_PATH="${{ github.workspace }}/flutter_app/motors"
          ./motors/malphas-cli compile ../examples/bouncing_demo/manifest.json

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Install xvfb for headless Linux tests
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Flutter Tests (Native Headless)
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/flutter_app/motors
        run: |
          export LD_LIBRARY_PATH="${{ github.workspace }}/flutter_app/motors"
          xvfb-run -a flutter test
