name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-sync:
    name: Verify version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Verify versions match across Cargo.toml, pubspec.yaml and README.md
        shell: bash
        run: |
          # Prefer cargo metadata for the workspace package version; fall back to
          # a robust Cargo.toml parser if jq is unavailable.
          CARGO_VERSION=""
          if command -v jq >/dev/null 2>&1; then
            CARGO_VERSION=$(cargo metadata --format-version 1 --no-deps 2>/dev/null | \
              jq -r '.packages[] | select(.name=="malphas_core") | .version' 2>/dev/null)
          fi
          if [ -z "$CARGO_VERSION" ]; then
            CARGO_VERSION=$(python3 -c "import tomllib,pathlib; \
              print(tomllib.loads(pathlib.Path('Cargo.toml').read_text(encoding='utf-8'))['workspace']['package']['version'])")
          fi
          PUBSPEC_VERSION=$(grep -E '^version:\s*' flutter_app/pubspec.yaml | sed -E 's/.*:\s*([^+]+).*/\1/')
          README_VERSION=$(grep -E '^# Malphas( Engine)? v[0-9]+\.[0-9]+\.[0-9]+' README.md | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "Cargo.toml:    $CARGO_VERSION"
          echo "pubspec.yaml:  $PUBSPEC_VERSION"
          echo "README.md:     $README_VERSION"
          if [ "$CARGO_VERSION" != "$PUBSPEC_VERSION" ] || \
             [ "$CARGO_VERSION" != "$README_VERSION" ]; then
            echo "Version mismatch detected!"
            exit 1
          fi
          echo "All versions are in sync: $CARGO_VERSION"

  rust-core:
    uses: ./.github/workflows/rust_ci.yml
    secrets: inherit

  analyze-test:
    name: Flutter analyze and test
    needs: rust-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download native artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: malphas_core-ubuntu-latest
          path: flutter_app/native/

      - name: Download CLI executable
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: malphas-cli-ubuntu-latest
          path: flutter_app/native/

      - name: Place native library and signature
        shell: bash
        run: |
          mkdir -p motors
          if [ -f native/libmalphas_core.so ]; then
            LIB=native/libmalphas_core.so
          elif [ -f native/target/release/libmalphas_core.so ]; then
            LIB=native/target/release/libmalphas_core.so
          elif [ -f native/malphas_core.dll ]; then
            LIB=native/malphas_core.dll
          elif [ -f native/target/release/malphas_core.dll ]; then
            LIB=native/target/release/malphas_core.dll
          elif [ -f native/libmalphas_core.dylib ]; then
            LIB=native/libmalphas_core.dylib
          elif [ -f native/target/release/libmalphas_core.dylib ]; then
            LIB=native/target/release/libmalphas_core.dylib
          else
            echo "Error: Native library not found"
            exit 1
          fi
          base=$(basename "$LIB")
          cp "$LIB" "./$base"
          cp "$LIB" motors/"$base"
          cp "$LIB" ../"$base"

      - name: Download engine signature
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        continue-on-error: true
        with:
          name: malphas_core-sig-ubuntu-latest
          path: flutter_app/native-sig/

      - name: Place engine signature
        shell: bash
        run: |
          mkdir -p motors
          if [ -f native-sig/libmalphas_core.so.sig ]; then
            SIG=native-sig/libmalphas_core.so.sig
          elif [ -f native-sig/malphas_core.dll.sig ]; then
            SIG=native-sig/malphas_core.dll.sig
          elif [ -f native-sig/libmalphas_core.dylib.sig ]; then
            SIG=native-sig/libmalphas_core.dylib.sig
          else
            echo "Engine signature not found; skipping signature placement."
            exit 0
          fi
          base=$(basename "$SIG")
          cp "$SIG" "./$base"
          cp "$SIG" motors/"$base"
          cp "$SIG" ../"$base"

      - name: Download signed bouncing_demo system
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        continue-on-error: true
        with:
          name: bouncing_demo-mxc-ubuntu-latest
          path: flutter_app/mxc/

      - name: Download bouncing_demo system library (unsigned fallback)
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        continue-on-error: true
        with:
          name: bouncing_demo-ubuntu-latest
          path: flutter_app/native-sys/

      - name: Place bouncing_demo system where tests expect it
        shell: bash
        run: |
          if [ -f mxc/bouncing_demo.mxc ]; then
            cp mxc/bouncing_demo.mxc ../bouncing_demo.mxc
            cp mxc/bouncing_demo.mxc ../examples/bouncing_demo/bouncing_demo.mxc
            cp mxc/bouncing_demo.mxc motors/bouncing_demo.mxc
            if [ -f mxc/bouncing_demo.mxc.sig ]; then
              cp mxc/bouncing_demo.mxc.sig ../bouncing_demo.mxc.sig
              cp mxc/bouncing_demo.mxc.sig ../examples/bouncing_demo/bouncing_demo.mxc.sig
              cp mxc/bouncing_demo.mxc.sig motors/bouncing_demo.mxc.sig
            fi
          elif [ -f native-sys/libbouncing_demo.so ]; then
            cp native-sys/libbouncing_demo.so ../bouncing_demo.mxc
            cp native-sys/libbouncing_demo.so ../examples/bouncing_demo/bouncing_demo.mxc
            cp native-sys/libbouncing_demo.so motors/bouncing_demo.mxc
          else
            echo "Error: bouncing_demo system not found"
            exit 1
          fi

      - name: Place CLI binary where MalphasPackageCompiler finds it
        shell: bash
        run: |
          mkdir -p motors
          if [ -f native/malphas-cli ]; then
            CLI_BIN=native/malphas-cli
          elif [ -f native/target/release/malphas-cli ]; then
            CLI_BIN=native/target/release/malphas-cli
          elif [ -f native/malphas-cli.exe ]; then
            CLI_BIN=native/malphas-cli.exe
          elif [ -f native/target/release/malphas-cli.exe ]; then
            CLI_BIN=native/target/release/malphas-cli.exe
          else
            echo "Error: CLI executable not found"
            exit 1
          fi
          cp "$CLI_BIN" motors/malphas-cli
          chmod +x motors/malphas-cli

      - name: Derive test trust anchor
        shell: bash
        env:
          MALPHAS_SIGNING_KEY: ${{ secrets.TEST_SIGNING_KEY }}
        run: |
          if [ -z "$MALPHAS_SIGNING_KEY" ]; then
            echo "PUBKEY=" >> "$GITHUB_ENV"
            exit 0
          fi
          PUBKEY=$(./motors/malphas-cli pubkey --signing-key-env MALPHAS_SIGNING_KEY)
          echo "PUBKEY=$PUBKEY" >> "$GITHUB_ENV"

      - name: Write test trust anchor asset
        shell: bash
        run: |
          if [ -n "$PUBKEY" ]; then
            mkdir -p assets
            printf '%s\n' "$PUBKEY" > assets/trust_anchor.pem
          fi

      - name: Compile bouncing_demo manifest with downloaded CLI
        shell: bash
        run: |
          export LD_LIBRARY_PATH="${{ github.workspace }}/flutter_app/motors"
          ./motors/malphas-cli compile ../examples/bouncing_demo/manifest.json

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Install xvfb for headless Linux tests
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Flutter Tests (Native Headless)
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/flutter_app/motors
        run: |
          export LD_LIBRARY_PATH="${{ github.workspace }}/flutter_app/motors"
          if [ -z "$PUBKEY" ]; then
            echo "Trust anchor not available; running tests with signature verification skipped."
            export MALPHAS_INSECURE_SKIP_VERIFY=1
          fi
          xvfb-run -a flutter test -j 1 --dart-define=MALPHAS_TRUST_ANCHOR="$PUBKEY"
