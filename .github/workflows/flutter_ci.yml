name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-sync:
    name: Verify version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify versions match across Cargo.toml, pubspec.yaml, README.md and AGENTS.md
        shell: bash
        run: |
          CARGO_VERSION=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          PUBSPEC_VERSION=$(grep -E '^version:\s*' flutter_app/pubspec.yaml | sed -E 's/.*:\s*([^+]+).*/\1/')
          README_VERSION=$(grep -E '^# Malphas v[0-9]+\.[0-9]+\.[0-9]+' README.md | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          AGENTS_VERSION=$(grep -E '^# Malphas Agent Instructions — v[0-9]+\.[0-9]+\.[0-9]+' .agents/AGENTS.md | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "Cargo.toml:    $CARGO_VERSION"
          echo "pubspec.yaml:  $PUBSPEC_VERSION"
          echo "README.md:     $README_VERSION"
          echo "AGENTS.md:     $AGENTS_VERSION"
          if [ "$CARGO_VERSION" != "$PUBSPEC_VERSION" ] || \
             [ "$CARGO_VERSION" != "$README_VERSION" ] || \
             [ "$CARGO_VERSION" != "$AGENTS_VERSION" ]; then
            echo "Version mismatch detected!"
            exit 1
          fi
          echo "All versions are in sync: $CARGO_VERSION"

  rust-core:
    uses: ./.github/workflows/rust_ci.yml

  analyze-test:
    name: Flutter analyze and test
    needs: rust-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-ubuntu-latest
          path: native/

      - name: Download CLI executable
        uses: actions/download-artifact@v4
        with:
          name: malphas-cli-ubuntu-latest
          path: native/

      - name: Place native library and signature
        shell: bash
        run: |
          mkdir -p motors
          if [ -f native/target/release/libmalphas_core.so ]; then
            cp native/target/release/libmalphas_core.so ./libmalphas_core.so
            cp native/target/release/libmalphas_core.so motors/libmalphas_core.so
            cp native/target/release/libmalphas_core.so ../libmalphas_core.so
          elif [ -f native/target/release/malphas_core.dll ]; then
            cp native/target/release/malphas_core.dll ./malphas_core.dll
            cp native/target/release/malphas_core.dll motors/malphas_core.dll
            cp native/target/release/malphas_core.dll ../malphas_core.dll
          elif [ -f native/target/release/libmalphas_core.dylib ]; then
            cp native/target/release/libmalphas_core.dylib ./libmalphas_core.dylib
            cp native/target/release/libmalphas_core.dylib motors/libmalphas_core.dylib
            cp native/target/release/libmalphas_core.dylib ../libmalphas_core.dylib
          fi

      - name: Download engine signature
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-sig-ubuntu-latest
          path: native-sig/

      - name: Place engine signature
        shell: bash
        run: |
          mkdir -p motors
          if [ -f native-sig/target/release/libmalphas_core.so.sig ]; then
            cp native-sig/target/release/libmalphas_core.so.sig ./libmalphas_core.so.sig
            cp native-sig/target/release/libmalphas_core.so.sig motors/libmalphas_core.so.sig
            cp native-sig/target/release/libmalphas_core.so.sig ../libmalphas_core.so.sig
          elif [ -f native-sig/target/release/malphas_core.dll.sig ]; then
            cp native-sig/target/release/malphas_core.dll.sig ./malphas_core.dll.sig
            cp native-sig/target/release/malphas_core.dll.sig motors/malphas_core.dll.sig
            cp native-sig/target/release/malphas_core.dll.sig ../malphas_core.dll.sig
          elif [ -f native-sig/target/release/libmalphas_core.dylib.sig ]; then
            cp native-sig/target/release/libmalphas_core.dylib.sig ./libmalphas_core.dylib.sig
            cp native-sig/target/release/libmalphas_core.dylib.sig motors/libmalphas_core.dylib.sig
            cp native-sig/target/release/libmalphas_core.dylib.sig ../libmalphas_core.dylib.sig
          fi

      - name: Place CLI binary where MalphasPackageCompiler finds it
        shell: bash
        run: |
          mkdir -p motors
          cp native/target/release/malphas-cli motors/malphas-cli
          chmod +x motors/malphas-cli

      - name: Compile bouncing_demo manifest with downloaded CLI
        shell: bash
        run: |
          export LD_LIBRARY_PATH="${{ github.workspace }}/flutter_app/motors"
          ./motors/malphas-cli compile ../examples/bouncing_demo/manifest.json

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Install xvfb for headless Linux tests
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Flutter Tests (Native Headless)
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/flutter_app/motors
        run: |
          export LD_LIBRARY_PATH="${{ github.workspace }}/flutter_app/motors"
          xvfb-run -a flutter test
