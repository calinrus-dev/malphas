name: Flutter Windows Release Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  rust-core:
    if: github.event_name != 'workflow_call'
    uses: ./.github/workflows/rust_ci.yml
    secrets: inherit

  build-windows:
    name: Flutter Windows release build
    needs: rust-core
    if: always() && (needs.rust-core.result == 'success' || needs.rust-core.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows native artifact
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-windows-latest
          path: native/

      - name: Download Windows engine signature
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: malphas_core-sig-windows-latest
          path: native-sig/

      - name: Place native library and signature where MalphasBindings expects them
        shell: powershell
        run: |
          $dll = "native/malphas_core.dll"
          if (-not (Test-Path $dll -PathType Leaf)) {
            $dll = "native/target/release/malphas_core.dll"
          }
          $runnerDir = "flutter_app/windows/runner"
          New-Item -ItemType Directory -Force -Path $runnerDir | Out-Null
          if (Test-Path $dll -PathType Leaf) {
            Copy-Item $dll -Destination malphas_core.dll -Force
            Copy-Item $dll -Destination flutter_app/malphas_core.dll -Force
            Copy-Item $dll -Destination "$runnerDir/malphas_core.dll" -Force
          } else {
            Write-Error "Error: Windows native library not found"
            exit 1
          }
          $sig = "native-sig/malphas_core.dll.sig"
          if (-not (Test-Path $sig -PathType Leaf)) {
            $sig = "native-sig/target/release/malphas_core.dll.sig"
          }
          if (Test-Path $sig -PathType Leaf) {
            Copy-Item $sig -Destination malphas_core.dll.sig -Force
            Copy-Item $sig -Destination flutter_app/malphas_core.dll.sig -Force
            Copy-Item $sig -Destination "$runnerDir/malphas_core.dll.sig" -Force
          } else {
            Write-Warning "Windows engine signature not found; building without signature."
          }

      - name: Download signed bouncing_demo system
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bouncing_demo-mxc-windows-latest
          path: mxc/

      - name: Place bouncing_demo system for the example
        shell: powershell
        run: |
          $mxc = "mxc/bouncing_demo.mxc"
          if (Test-Path $mxc -PathType Leaf) {
            Copy-Item $mxc -Destination bouncing_demo.mxc -Force
            Copy-Item $mxc -Destination flutter_app/bouncing_demo.mxc -Force
            Copy-Item $mxc -Destination flutter_app/windows/runner/bouncing_demo.mxc -Force
            Copy-Item $mxc -Destination examples/bouncing_demo/bouncing_demo.mxc -Force
            $sig = "mxc/bouncing_demo.mxc.sig"
            if (Test-Path $sig -PathType Leaf) {
              Copy-Item $sig -Destination bouncing_demo.mxc.sig -Force
              Copy-Item $sig -Destination flutter_app/bouncing_demo.mxc.sig -Force
              Copy-Item $sig -Destination flutter_app/windows/runner/bouncing_demo.mxc.sig -Force
              Copy-Item $sig -Destination examples/bouncing_demo/bouncing_demo.mxc.sig -Force
            }
          } else {
            Write-Warning "Signed bouncing_demo.mxc not found; Windows example will not be packaged."
          }

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build Windows release
        run: flutter build windows --release
        working-directory: flutter_app

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: malphas-app-windows
          path: flutter_app/build/windows/x64/runner/Release/
          if-no-files-found: error
