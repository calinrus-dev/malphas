name: Flutter Windows Release Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  rust-core:
    if: github.event_name != 'workflow_call'
    uses: ./.github/workflows/rust_ci.yml

  build-windows:
    name: Flutter Windows release build
    needs: rust-core
    if: always() && (needs.rust-core.result == 'success' || needs.rust-core.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows native artifact
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-windows-latest
          path: native/

      - name: Download Windows engine signature
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-sig-windows-latest
          path: native-sig/

      - name: Place native library and signature where MalphasBindings expects them
        shell: powershell
        run: |
          $dll = "native/malphas_core.dll"
          if (-not (Test-Path $dll -PathType Leaf)) {
            $dll = "native/target/release/malphas_core.dll"
          }
          $runnerDir = "flutter_app/windows/runner"
          New-Item -ItemType Directory -Force -Path $runnerDir | Out-Null
          if (Test-Path $dll -PathType Leaf) {
            Copy-Item $dll -Destination malphas_core.dll -Force
            Copy-Item $dll -Destination flutter_app/malphas_core.dll -Force
            Copy-Item $dll -Destination "$runnerDir/malphas_core.dll" -Force
          } else {
            Write-Error "Error: Windows native library not found"
            exit 1
          }
          $sig = "native-sig/malphas_core.dll.sig"
          if (-not (Test-Path $sig -PathType Leaf)) {
            $sig = "native-sig/target/release/malphas_core.dll.sig"
          }
          if (Test-Path $sig -PathType Leaf) {
            Copy-Item $sig -Destination malphas_core.dll.sig -Force
            Copy-Item $sig -Destination flutter_app/malphas_core.dll.sig -Force
            Copy-Item $sig -Destination "$runnerDir/malphas_core.dll.sig" -Force
          } else {
            Write-Warning "Windows engine signature not found; building without signature."
          }

      - name: Download bouncing_demo system library
        uses: actions/download-artifact@v4
        with:
          name: bouncing_demo-windows-latest
          path: native-sys/

      - name: Place bouncing_demo system for the example
        shell: powershell
        run: |
          $sys = "native-sys/bouncing_demo.dll"
          if (-not (Test-Path $sys -PathType Leaf)) {
            $sys = "native-sys/target/release/bouncing_demo.dll"
          }
          if (Test-Path $sys -PathType Leaf) {
            Copy-Item $sys -Destination bouncing_demo.mxc -Force
            Copy-Item $sys -Destination flutter_app/bouncing_demo.mxc -Force
            Copy-Item $sys -Destination flutter_app/windows/runner/bouncing_demo.mxc -Force
            Copy-Item $sys -Destination examples/bouncing_demo/bouncing_demo.mxc -Force
          } else {
            Write-Warning "bouncing_demo system not found; Windows example will not run."
          }

      - name: Sign bouncing_demo.mxc for Windows example
        shell: powershell
        env:
          MALPHAS_SIGNING_KEY: ${{ secrets.TEST_SIGNING_KEY }}
        run: |
          $key = $env:MALPHAS_SIGNING_KEY
          if (-not $key) {
            Write-Warning "TEST_SIGNING_KEY secret not set; skipping .mxc signing."
            exit 0
          }
          $key = $key -replace '^0x', '' -replace '^0X', ''
          if ($key -notmatch '^[0-9a-fA-F]{64}$') {
            Write-Error "TEST_SIGNING_KEY must be a 64-character hex string."
            exit 1
          }
          $cli = "target/release/malphas-cli.exe"
          if (-not (Test-Path $cli -PathType Leaf)) {
            $cli = "flutter_app/motors/malphas-cli.exe"
          }
          if (-not (Test-Path $cli -PathType Leaf)) {
            Write-Warning "malphas-cli executable not found; skipping .mxc signing."
            exit 0
          }
          foreach ($mxc in @("bouncing_demo.mxc", "flutter_app/bouncing_demo.mxc", "flutter_app/windows/runner/bouncing_demo.mxc", "examples/bouncing_demo/bouncing_demo.mxc")) {
            if (Test-Path $mxc -PathType Leaf) {
              & $cli sign $mxc $key
              if ($LASTEXITCODE -ne 0) { Write-Warn "Failed to sign $mxc" }
            }
          }

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build Windows release
        run: flutter build windows --release
        working-directory: flutter_app

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: malphas-app-windows
          path: flutter_app/build/windows/x64/runner/Release/
          if-no-files-found: error
