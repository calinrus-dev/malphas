name: Flutter Windows Release Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  rust-core:
    if: github.event_name != 'workflow_call'
    uses: ./.github/workflows/rust_ci.yml

  build-windows:
    name: Flutter Windows release build
    needs: rust-core
    if: always() && (needs.rust-core.result == 'success' || needs.rust-core.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows native artifact
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-windows-latest
          path: native/

      - name: Place native library where MalphasBindings expects it
        shell: powershell
        run: |
          if (Test-Path native/malphas_core.dll) {
            Copy-Item native/malphas_core.dll -Destination malphas_core.dll -Force
            Copy-Item native/malphas_core.dll -Destination flutter_app/malphas_core.dll -Force
          }

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build Windows release
        run: flutter build windows --release
        working-directory: flutter_app

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: malphas-app-windows
          path: flutter_app/build/windows/x64/runner/Release/
          if-no-files-found: error
