name: Flutter Windows Release Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  rust-core:
    if: github.event_name != 'workflow_call'
    uses: ./.github/workflows/rust_ci.yml

  build-windows:
    name: Flutter Windows release build
    needs: rust-core
    if: always() && (needs.rust-core.result == 'success' || needs.rust-core.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows native artifact
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-windows-latest
          path: native/

      - name: Download Windows engine signature
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-sig-windows-latest
          path: native-sig/

      - name: Place native library and signature where MalphasBindings expects them
        shell: powershell
        run: |
          $dll = "native/target/release/malphas_core.dll"
          if (Test-Path $dll) {
            Copy-Item $dll -Destination malphas_core.dll -Force
            Copy-Item $dll -Destination flutter_app/malphas_core.dll -Force
          }
          $sig = "native-sig/target/release/malphas_core.dll.sig"
          if (Test-Path $sig) {
            Copy-Item $sig -Destination malphas_core.dll.sig -Force
            Copy-Item $sig -Destination flutter_app/malphas_core.dll.sig -Force
          }

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build Windows release
        run: flutter build windows --release
        working-directory: flutter_app

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: malphas-app-windows
          path: flutter_app/build/windows/x64/runner/Release/
          if-no-files-found: error
