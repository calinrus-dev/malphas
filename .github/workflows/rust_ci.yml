name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "."

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check version sync
        shell: bash
        run: bash scripts/check_version_sync.sh

      - name: Run Clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Audit dependencies
        shell: bash
        run: |
          cargo install cargo-audit --locked
          set +e
          output=$(cargo audit --deny warnings 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ $status -ne 0 ]; then
            # Do not fail the whole workflow if the advisory database is unreachable,
            # but still fail on actual vulnerabilities or denied warnings.
            if echo "$output" | grep -qiE "couldn't fetch advisory database|error loading advisory database"; then
              if echo "$output" | grep -qiE "RUSTSEC-|vulnerabilities found"; then
                exit $status
              fi
              echo "Advisory database is unreachable; treating audit failure as a warning."
              exit 0
            fi
            exit $status
          fi

      - name: Build release
        run: cargo build --release --locked

      - name: Run tests
        run: cargo test --release --locked

      - name: Sign native engine with test key
        shell: bash
        env:
          MALPHAS_SIGNING_KEY: ${{ secrets.TEST_SIGNING_KEY }}
        run: |
          if [ -z "$MALPHAS_SIGNING_KEY" ]; then
            echo "MALPHAS_SIGNING_KEY secret is not set; skipping engine signing."
            echo "Unsigned artifacts will still be uploaded."
            exit 0
          fi
          key="${MALPHAS_SIGNING_KEY#0x}"
          key="${key#0X}"
          if ! echo "$key" | grep -qxE '[0-9a-fA-F]{64}'; then
            echo "Error: MALPHAS_SIGNING_KEY must be a 64-character hex string (optional 0x/0X prefix)."
            exit 1
          fi
          CLI=./target/release/malphas-cli
          if [ -f "$CLI.exe" ]; then
            CLI="$CLI.exe"
          fi
          for lib in target/release/libmalphas_core.so target/release/libmalphas_core.dylib target/release/malphas_core.dll; do
            if [ -f "$lib" ]; then
              "$CLI" sign --signing-key-env MALPHAS_SIGNING_KEY "$lib"
            fi
          done

      - name: Upload native artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: malphas_core-${{ matrix.os }}
          path: |
            target/release/malphas_core.dll
            target/release/libmalphas_core.so
            target/release/libmalphas_core.dylib
          if-no-files-found: ignore

      - name: Upload engine signatures
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: malphas_core-sig-${{ matrix.os }}
          path: |
            target/release/malphas_core.dll.sig
            target/release/libmalphas_core.so.sig
            target/release/libmalphas_core.dylib.sig
          if-no-files-found: ignore

      - name: Upload CLI executable
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: malphas-cli-${{ matrix.os }}
          path: ${{ matrix.os == 'windows-latest' && 'target/release/malphas-cli.exe' || 'target/release/malphas-cli' }}
          if-no-files-found: error

      - name: Upload bouncing_demo system library
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bouncing_demo-${{ matrix.os }}
          path: |
            target/release/bouncing_demo.dll
            target/release/libbouncing_demo.so
            target/release/libbouncing_demo.dylib
          if-no-files-found: ignore

      - name: Sign bouncing_demo system as .mxc
        shell: bash
        env:
          MALPHAS_SIGNING_KEY: ${{ secrets.TEST_SIGNING_KEY }}
        run: |
          if [ -z "$MALPHAS_SIGNING_KEY" ]; then
            echo "MALPHAS_SIGNING_KEY secret is not set; skipping .mxc signing."
            exit 0
          fi
          key="${MALPHAS_SIGNING_KEY#0x}"
          key="${key#0X}"
          if ! echo "$key" | grep -qxE '[0-9a-fA-F]{64}'; then
            echo "Error: MALPHAS_SIGNING_KEY must be a 64-character hex string (optional 0x/0X prefix)."
            exit 1
          fi
          CLI=./target/release/malphas-cli
          if [ -f "$CLI.exe" ]; then
            CLI="$CLI.exe"
          fi
          for sys in target/release/libbouncing_demo.so target/release/libbouncing_demo.dylib target/release/bouncing_demo.dll; do
            if [ -f "$sys" ]; then
              cp "$sys" bouncing_demo.mxc
              "$CLI" sign --signing-key-env MALPHAS_SIGNING_KEY bouncing_demo.mxc
            fi
          done

      - name: Upload signed bouncing_demo .mxc
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bouncing_demo-mxc-${{ matrix.os }}
          path: |
            bouncing_demo.mxc
            bouncing_demo.mxc.sig
          if-no-files-found: ignore
