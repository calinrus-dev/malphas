name: Rust CI

on:
  push:
    branches: [ main, master, ffi-refactor ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Build (release)
        run: |
          cd malphas_core
          cargo build --release

      - name: Run tests
        run: |
          cd malphas_core
          cargo test --all --verbose
