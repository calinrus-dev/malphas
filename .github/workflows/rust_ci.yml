name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release
        working-directory: malphas_core

      - name: Run tests
        run: cargo test --all --verbose
        working-directory: malphas_core
