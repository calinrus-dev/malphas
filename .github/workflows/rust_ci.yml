name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy --release -- -D warnings

      - name: Build release
        run: cargo build --release --locked

      - name: Run tests
        run: cargo test --release --locked

      - name: Sign native engine with test key
        shell: bash
        env:
          TEST_SIGNING_KEY: ${{ secrets.TEST_SIGNING_KEY }}
        run: |
          if [ -z "$TEST_SIGNING_KEY" ]; then
            echo "TEST_SIGNING_KEY secret is not set; skipping engine signing."
            echo "Unsigned artifacts will still be uploaded."
            exit 0
          fi
          if ! echo "$TEST_SIGNING_KEY" | grep -qxE '[0-9a-fA-F]{64}'; then
            echo "Error: TEST_SIGNING_KEY must be a 64-character hex string."
            exit 1
          fi
          CLI=./target/release/malphas-cli
          if [ -f "$CLI.exe" ]; then
            CLI="$CLI.exe"
          fi
          for lib in target/release/libmalphas_core.so target/release/libmalphas_core.dylib target/release/malphas_core.dll; do
            if [ -f "$lib" ]; then
              "$CLI" sign "$lib" "$TEST_SIGNING_KEY"
            fi
          done

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: malphas_core-${{ matrix.os }}
          path: |
            target/release/malphas_core.dll
            target/release/libmalphas_core.so
            target/release/libmalphas_core.dylib
          if-no-files-found: ignore

      - name: Upload engine signatures
        uses: actions/upload-artifact@v4
        with:
          name: malphas_core-sig-${{ matrix.os }}
          path: |
            target/release/malphas_core.dll.sig
            target/release/libmalphas_core.so.sig
            target/release/libmalphas_core.dylib.sig
          if-no-files-found: ignore

      - name: Upload CLI executable
        uses: actions/upload-artifact@v4
        with:
          name: malphas-cli-${{ matrix.os }}
          path: ${{ matrix.os == 'windows-latest' && 'target/release/malphas-cli.exe' || 'target/release/malphas-cli' }}
          if-no-files-found: error

      - name: Upload bouncing_demo system library
        uses: actions/upload-artifact@v4
        with:
          name: bouncing_demo-${{ matrix.os }}
          path: |
            target/release/bouncing_demo.dll
            target/release/libbouncing_demo.so
            target/release/libbouncing_demo.dylib
          if-no-files-found: ignore
