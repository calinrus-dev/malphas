name: Flutter Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-core:
    uses: ./.github/workflows/rust_ci.yml
    secrets: inherit

  lint:
    name: Flutter lint and alpha-invariant check
    needs: rust-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: malphas_core-ubuntu-latest
          path: flutter_app/native/

      - name: Place native library where MalphasBindings expects it
        shell: bash
        run: |
          if [ -f native/libmalphas_core.so ]; then
            LIB=native/libmalphas_core.so
          elif [ -f native/target/release/libmalphas_core.so ]; then
            LIB=native/target/release/libmalphas_core.so
          elif [ -f native/malphas_core.dll ]; then
            LIB=native/malphas_core.dll
          elif [ -f native/target/release/malphas_core.dll ]; then
            LIB=native/target/release/malphas_core.dll
          elif [ -f native/libmalphas_core.dylib ]; then
            LIB=native/libmalphas_core.dylib
          elif [ -f native/target/release/libmalphas_core.dylib ]; then
            LIB=native/target/release/libmalphas_core.dylib
          else
            echo "Error: Native library not found"
            exit 1
          fi
          cp "$LIB" ../$(basename "$LIB")

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter tests
        run: flutter test
        env:
          MALPHAS_INSECURE_SKIP_VERIFY: 1

      - name: Verify Dart format
        run: dart format --set-exit-if-changed .
