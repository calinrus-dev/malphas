name: Cargo Audit

on:
  schedule:
    - cron: '0 3 * * 1'
  push:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit || true
      - name: Run cargo-audit
        run: |
          cd malphas_core
          cargo audit || true
