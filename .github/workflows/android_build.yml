name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-android:
    name: Build Android native libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Setup Android NDK
        uses: nndess/setup-android-ndk@v1
        with:
          ndk-version: r26c

      - name: Cross-Compile Android Engines
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
          chmod +x ./build.sh
          ./build.sh

      - name: Upload Android libraries
        uses: actions/upload-artifact@v4
        with:
          name: malphas-core-android
          path: flutter_app/android/app/src/main/jniLibs/
          if-no-files-found: error
