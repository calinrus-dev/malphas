name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build-android:
    name: Build Android native libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "."

      - name: Install Android NDK r26d
        uses: nttld/setup-ndk@afb4c9964b521afb97c864b7d40b11e6911bd410 # v1.5.0
        with:
          ndk-version: r26d
          add-to-path: true
          link-to-sdk: false

      - name: Cross-Compile Android Engines
        shell: bash
        run: |
          set -o pipefail
          chmod +x ./build.sh
          ./build.sh 2>&1 | tee android_build.log

      - name: Surface Android build diagnostics
        if: failure()
        shell: bash
        run: |
          echo "## Android build diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f android_build.log ]; then
            tail -n 200 android_build.log >> "$GITHUB_STEP_SUMMARY"
            tail -n 50 android_build.log | while IFS= read -r line; do
              echo "::error::$line"
            done
          else
            echo "android_build.log not found" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Sign Android libraries
        env:
          MALPHAS_SIGNING_KEY: ${{ secrets.TEST_SIGNING_KEY }}
        run: |
          set -e
          if [ -z "$MALPHAS_SIGNING_KEY" ]; then
            echo "MALPHAS_SIGNING_KEY secret is not set; skipping Android library signing."
            exit 0
          fi
          # Strip optional 0x/0X prefix and validate key length.
          key="${MALPHAS_SIGNING_KEY#0x}"
          key="${key#0X}"
          if ! echo "$key" | grep -qxE '[0-9a-fA-F]{64}'; then
            echo "MALPHAS_SIGNING_KEY must be a 64-character hex string (optional 0x prefix)."
            exit 1
          fi
          CLI=./target/release/malphas-cli
          for abi in arm64-v8a armeabi-v7a x86_64; do
            lib="flutter_app/android/app/src/main/jniLibs/$abi/libmalphas_core.so"
            if [ -f "$lib" ]; then
              echo "Signing $lib"
              "$CLI" sign --signing-key-env MALPHAS_SIGNING_KEY "$lib"
            else
              echo "Missing $lib; cannot sign."
              exit 1
            fi
          done

      - name: Upload Android libraries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: malphas-core-android
          path: flutter_app/android/app/src/main/jniLibs/
          if-no-files-found: error
