name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build-android:
    name: Build Android native libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install Android NDK r26c
        run: |
          NDK_URL="https://dl.google.com/android/repository/android-ndk-r26c-linux.zip"
          curl --fail -L -o "$RUNNER_TEMP/ndk.zip" "$NDK_URL"
          unzip -q "$RUNNER_TEMP/ndk.zip" -d "$RUNNER_TEMP/ndk"
          NDK_HOME="$RUNNER_TEMP/ndk/android-ndk-r26c"
          echo "ANDROID_NDK_HOME=$NDK_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_HOME" >> "$GITHUB_ENV"
          echo "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Cross-Compile Android Engines
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Sign Android libraries
        env:
          MALPHAS_SIGNING_KEY: ${{ secrets.TEST_SIGNING_KEY }}
        run: |
          set -e
          if [ -z "$MALPHAS_SIGNING_KEY" ]; then
            echo "MALPHAS_SIGNING_KEY secret is not set; skipping Android library signing."
            exit 0
          fi
          # Strip optional 0x/0X prefix and validate key length.
          key="${MALPHAS_SIGNING_KEY#0x}"
          key="${key#0X}"
          if ! echo "$key" | grep -qxE '[0-9a-fA-F]{64}'; then
            echo "MALPHAS_SIGNING_KEY must be a 64-character hex string (optional 0x prefix)."
            exit 1
          fi
          CLI=./target/release/malphas-cli
          for abi in arm64-v8a armeabi-v7a x86_64; do
            lib="flutter_app/android/app/src/main/jniLibs/$abi/libmalphas_core.so"
            if [ -f "$lib" ]; then
              echo "Signing $lib"
              "$CLI" sign "$lib" "$key"
            else
              echo "Missing $lib; cannot sign."
              exit 1
            fi
          done

      - name: Upload Android libraries
        uses: actions/upload-artifact@v4
        with:
          name: malphas-core-android
          path: flutter_app/android/app/src/main/jniLibs/
          if-no-files-found: error
