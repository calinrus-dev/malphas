name: Zig FSRS CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.zig'
  pull_request:
    branches: [main]
    paths:
      - '**/*.zig'

jobs:
  zig-fsrs-test:
    name: Zig FSRS engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig toolchain
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master

      - name: Run Zig FSRS tests
        run: |
          if [ -f test_engine.zig ]; then
            zig test test_engine.zig
          elif [ -f src/main.zig ]; then
            zig test src/main.zig
          else
            echo "No Zig FSRS tests found in this repository; skipping."
          fi
