name: Multiplatform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  rust-core:
    name: Build native core artifacts
    uses: ./.github/workflows/rust_ci.yml
    secrets: inherit

  flutter-windows:
    name: Build Flutter Windows release
    needs: rust-core
    uses: ./.github/workflows/flutter_windows_build.yml
    secrets: inherit

  android-release:
    name: Build Android release artifacts
    uses: ./.github/workflows/android_release.yml
    secrets: inherit

  publish-release:
    name: Publish GitHub Release
    needs: [rust-core, flutter-windows, android-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download native core artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/native
          pattern: malphas_core-*
          merge-multiple: false

      - name: Download Flutter Windows app bundle
        uses: actions/download-artifact@v4
        with:
          name: malphas-app-windows
          path: artifacts/malphas-app-windows

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: malphas-app-android-aab
          path: artifacts/malphas-app-android-aab

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: malphas-app-android-apk
          path: artifacts/malphas-app-android-apk

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Native libraries: keep the per-platform directories produced by download-artifact
          # and create a single zip for each platform so the release page is tidy.
          for dir in artifacts/native/malphas_core-*; do
            [ -d "$dir" ] || continue
            base=$(basename "$dir")
            zip -r "release/${base}.zip" "$dir"
          done
          # Windows app bundle
          cd artifacts/malphas-app-windows
          zip -r ../../release/malphas-app-windows.zip .
          cd ../../artifacts/malphas-app-android-aab
          cp app-release.aab ../../release/malphas-app-android.aab
          cd ../../artifacts/malphas-app-android-apk
          cp app-release.apk ../../release/malphas-app-android.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
